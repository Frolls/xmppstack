---
- name: Assert required variables are defined
  ansible.builtin.assert:
    that:
      - xmpp_stack_domain | length > 0
      - xmpp_stack_upload_host | length > 0
      - xmpp_stack_conference_host | length > 0
      - xmpp_stack_public_ip | length > 0
      - xmpp_stack_postgres_password | length > 0
      - xmpp_stack_turn_static_auth_secret | length > 0
      - xmpp_stack_admin_jid | length > 0
      - xmpp_stack_certbot_email | length > 0
      - xmpp_stack_certbot_domains | length > 0
    fail_msg: Set the required xmpp_stack_* variables in inventory/group_vars before running the role.
