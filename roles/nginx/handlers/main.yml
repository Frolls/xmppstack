---
- name: nginx reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: not ansible_check_mode

- name: nginx check certificate presence
  ansible.builtin.stat:
    path: "{{ xmpp_stack_letsencrypt_dir }}/live/{{ xmpp_stack_domain }}/fullchain.pem"
  register: xmpp_stack_nginx_handler_cert_stat
  listen: nginx restart service

- name: nginx restart service if certificate exists
  ansible.builtin.systemd_service:
    name: nginx.service
    state: restarted
  when:
    - not ansible_check_mode
    - xmpp_stack_nginx_handler_cert_stat.stat.exists
  listen: nginx restart service
