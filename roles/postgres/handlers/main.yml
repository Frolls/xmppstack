---
- name: postgres reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: not ansible_check_mode

- name: postgres check unit presence
  ansible.builtin.command:
    argv:
      - systemctl
      - show
      - postgres.service
      - --property=LoadState
      - --value
  register: xmpp_stack_postgres_unit_state
  changed_when: false
  failed_when: false
  listen: postgres restart service

- name: postgres restart service
  ansible.builtin.systemd_service:
    name: postgres.service
    state: restarted
  when:
    - not ansible_check_mode
    - (xmpp_stack_postgres_unit_state.stdout | default('')) != 'not-found'
