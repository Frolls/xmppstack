---
argument_specs:
  main:
    short_description: PostgreSQL service role for ejabberd storage.
    options:
      xmpp_stack_postgres_image:
        type: str
        description:
          - PostgreSQL container image reference.
      xmpp_stack_postgres_db:
        type: str
        required: true
        description:
          - Database name created for ejabberd.
      xmpp_stack_postgres_user:
        type: str
        required: true
        description:
          - PostgreSQL user created for ejabberd.
      xmpp_stack_postgres_password:
        type: str
        required: true
        description:
          - Password for the ejabberd PostgreSQL user.
      xmpp_stack_postgres_data_dir:
        type: str
        required: true
        description:
          - Host path used for persistent PostgreSQL data.
      xmpp_stack_postgres_port:
        type: int
        description:
          - Host port published for internal stack access to PostgreSQL.
      xmpp_stack_app_root:
        type: str
        required: true
        description:
          - Runtime root where the rendered Quadlet unit is stored.
