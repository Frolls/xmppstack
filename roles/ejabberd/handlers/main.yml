---
- name: ejabberd reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: not ansible_check_mode

- name: ejabberd check certificate presence
  ansible.builtin.stat:
    path: "{{ xmpp_stack_letsencrypt_dir }}/live/{{ xmpp_stack_domain }}/fullchain.pem"
  register: xmpp_stack_ejabberd_handler_cert_stat
  listen: ejabberd restart service

- name: ejabberd restart service if certificate exists
  ansible.builtin.systemd_service:
    name: ejabberd.service
    state: restarted
  when:
    - not ansible_check_mode
    - xmpp_stack_ejabberd_handler_cert_stat.stat.exists
  listen: ejabberd restart service
