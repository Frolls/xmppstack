---
- name: Install firewall packages
  ansible.builtin.package:
    name:
      - nftables
    state: present
  when: xmpp_stack_firewall_enabled
  tags:
    - packages
    - firewall

- name: Render nftables configuration
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"
  when: xmpp_stack_firewall_enabled
  notify:
    - firewall reload nftables
  tags:
    - config
    - firewall

- name: Ensure nftables service is enabled and started
  ansible.builtin.systemd_service:
    name: nftables.service
    enabled: true
    state: started
  when: xmpp_stack_firewall_enabled
  tags:
    - services
    - firewall
